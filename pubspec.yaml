name: tina_jarvis
description: TINA - Just A Rather Very Intelligent System. JARVIS-style voice assistant for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 语音识别和 TTS
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.0
  
  # 唤醒词 (Porcupine)
  porcupine_flutter: ^3.0.0
  
  # 实时通信
  web_socket_channel: ^3.0.0
  mqtt_client: ^10.0.0
  
  # 动画和 UI
  lottie: ^3.0.0
  shimmer: ^3.0.0
  glass_kit: ^3.0.0
  
  # 音频
  just_audio: ^0.9.0
  audio_waveforms: ^1.0.0
  
  # 状态管理
  flutter_bloc: ^8.1.0
  equatable: ^2.0.0
  
  # 本地存储
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  
  # 权限
  permission_handler: ^11.0.0
  
  # 网络
  http: ^1.1.0
  dio: ^5.3.0
  
  # 工具
  intl: ^0.18.0
  uuid: ^4.2.0
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
flutter:
  uses-material-design: true
  
  assets:
    - assets/animations/
    - assets/sounds/
    - assets/images/
    
  fonts:
    - family: Orbitron
      fonts:
        - asset: fonts/Orbitron-Regular.ttf
        - asset: fonts/Orbitron-Bold.ttf
          weight: 700
    - family: Exo
      fonts:
        - asset: fonts/Exo-Regular.ttf
        - asset: fonts/Exo-Bold.ttf
          weight: 700
